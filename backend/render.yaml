services:
  - type: web
    name: qamqorzoo-backend
    env: python
    plan: free
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        value: "sqlite:///./qamqorzoo.db"
      - key: CORS_ORIGINS
        value: "*"
